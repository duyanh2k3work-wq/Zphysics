<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zphysics - Hệ thống Vật lí THPT</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #f0f4ff;
      --card: rgba(255, 255, 255, 0.75);
      --card-solid: #ffffff;
      --glass: rgba(255, 255, 255, 0.55);
      --border: rgba(255, 255, 255, 0.8);
      --shadow: rgba(120, 140, 200, 0.18);
      --text: #2d3561;
      --muted: #8e97c5;
      --teal: #2ec4b6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--text);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 10% 0%, #c8d8ff 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 90% 10%, #ffd6e8 0%, transparent 55%),
        radial-gradient(ellipse 40% 50% at 80% 90%, #c8f5f2 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 10% 85%, #ffe8cc 0%, transparent 55%),
        #f0f4ff;
      pointer-events: none;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 460px;
      margin: 0 auto;
      padding: 0 0 48px;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      padding: 52px 24px 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    .header-left h1 {
      font-size: 28px;
      font-weight: 900;
      color: var(--text);
      margin-top: 2px;
      line-height: 1.2;
    }

    .header-left h1 span {
      color: var(--teal);
    }

    .avatar-btn {
      width: 48px;
      height: 48px;
      border-radius: 18px;
      background: var(--card);
      border: 2px solid var(--border);
      box-shadow: 0 4px 16px var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      backdrop-filter: blur(12px);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s ease;
      padding: 0;
      outline: none;
    }

    .avatar-btn:hover {
      transform: scale(1.1) rotate(5deg);
      box-shadow: 0 8px 24px var(--shadow);
    }

    .avatar-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 14px;
    }

    /* ── GRADE TABS ── */
    .grade-strip {
      padding: 10px 20px 20px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .grade-strip::-webkit-scrollbar {
      display: none;
    }

    .grade-pill {
      flex-shrink: 0;
      padding: 9px 22px;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 14px;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      background: var(--glass);
      color: var(--muted);
      border: 1.5px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .grade-pill.active {
      background-size: 200% 200%;
      animation: shimmer 3s ease infinite;
    }

    .grade-pill.grade-0.active {
      background-image: linear-gradient(135deg, #43a047, #81c784, #43a047);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 6px 20px rgba(67, 160, 71, 0.4);
      transform: scale(1.05);
    }

    .grade-pill.grade-1.active {
      background-image: linear-gradient(135deg, #f9a825, #ffd54f, #f9a825);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 6px 20px rgba(249, 168, 37, 0.4);
      transform: scale(1.05);
    }

    .grade-pill.grade-2.active {
      background-image: linear-gradient(135deg, #e53935, #ef9a9a, #e53935);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 6px 20px rgba(229, 57, 53, 0.4);
      transform: scale(1.05);
    }

    /* ── SECTION LABEL ── */
    .section-label {
      padding: 4px 24px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-label h3 {
      font-size: 19px;
      font-weight: 900;
      color: var(--text);
    }

    /* ── CHAPTER CARDS ── */
    .cards-list {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .ch-card {
      border-radius: 24px;
      overflow: hidden;
      background: var(--card-solid);
      box-shadow: 0 4px 24px var(--shadow);
      border: 1.5px solid var(--border);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s ease;
      animation: slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .ch-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px var(--shadow);
    }

    .ch-card:nth-child(1) {
      animation-delay: 0.04s;
    }

    .ch-card:nth-child(2) {
      animation-delay: 0.08s;
    }

    .ch-card:nth-child(3) {
      animation-delay: 0.12s;
    }

    .ch-card:nth-child(4) {
      animation-delay: 0.16s;
    }

    .ch-card:nth-child(5) {
      animation-delay: 0.20s;
    }

    .ch-card:nth-child(6) {
      animation-delay: 0.24s;
    }

    .ch-card:nth-child(7) {
      animation-delay: 0.28s;
    }

    .ch-card:active {
      transform: scale(0.98) translateY(0);
    }

    .ch-header {
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      user-select: none;
    }

    .ch-icon-wrap {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: visible;
    }

    .pill {
      width: 38px;
      height: 20px;
      border-radius: 10px;
      position: absolute;
      transform-origin: center;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .pill-a {
      transform: rotate(-30deg) translate(-4px, -4px);
      opacity: 0.9;
    }

    .pill-b {
      transform: rotate(50deg) translate(4px, 2px);
      opacity: 0.85;
      width: 22px;
      height: 22px;
      border-radius: 11px;
    }

    .pill-c {
      transform: rotate(15deg) translate(0px, 6px);
      opacity: 0.8;
      width: 28px;
      height: 14px;
      border-radius: 7px;
    }

    .ch-card:hover .pill-a {
      transform: rotate(-40deg) translate(-6px, -8px) scale(1.1);
    }

    .ch-card:hover .pill-b {
      transform: rotate(65deg) translate(6px, 0px) scale(1.15);
    }

    .ch-card:hover .pill-c {
      transform: rotate(5deg) translate(-2px, 8px) scale(1.05);
    }

    .ch-info {
      flex: 1;
      min-width: 0;
    }

    .ch-num {
      font-size: 10px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 3px;
    }

    .ch-title {
      font-size: 16px;
      font-weight: 900;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tags {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .tag {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      border: 1.5px solid currentColor;
      opacity: 0.85;
    }

    .ch-arrow {
      flex-shrink: 0;
    }

    .ch-arrow svg {
      width: 18px;
      height: 18px;
      stroke: var(--muted);
      stroke-width: 2.5;
      fill: none;
      transition: 0.3s;
    }

    .ch-card.open .ch-arrow svg {
      transform: rotate(180deg);
    }

    /* ── LESSON LIST ── */
    .lesson-list {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
      background: rgba(240, 244, 255, 0.55);
    }

    .ch-card.open .lesson-list {
      max-height: 4000px;
      opacity: 1;
      transition: max-height 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s ease 0.1s;
    }

    .lesson-inner {
      padding: 6px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── LESSON ROW ── */
    .lesson-row {
      background: var(--card-solid);
      border-radius: 18px;
      box-shadow: 0 2px 10px rgba(120, 140, 200, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.9);
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
    }

    .lesson-row:hover {
      box-shadow: 0 8px 24px var(--shadow);
      transform: translateY(-2px) scale(1.01);
    }

    .lesson-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px 6px;
    }

    .lesson-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .lesson-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
      line-height: 1.4;
    }

    .lesson-num {
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── LINK BUTTONS ── */
    .lesson-links {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0 14px 11px 32px;
    }

    .lnk {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 11px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 800;
      text-decoration: none;
      transition: all 0.18s;
      white-space: nowrap;
    }

    .lnk svg {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
    }

    .lnk:hover {
      transform: translateY(-1px);
      filter: brightness(1.1);
    }

    /* Link colour variants */
    .lnk-video {
      background: #ffebee;
      color: #c62828;
    }

    .lnk-baiTap {
      background: #e3f2fd;
      color: #1565c0;
    }

    .lnk-tracNghiem {
      background: #fff3e0;
      color: #e65100;
    }

    .lnk-dungSai {
      background: #fce4ec;
      color: #c62828;
    }

    .lnk-traLoiNgan {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .lnk-phieuDapAn {
      background: #ede7f6;
      color: #4527a0;
    }

    .lnk-onTap {
      background: #e0f7fa;
      color: #00838f;
    }
    .lnk-luyenDe {
      background: #f3e5f5;
      color: #7b1fa2;
    }

    /* ── GRADE SECTIONS ── */
    .grade-section {
      display: none;
    }

    .grade-section.active {
      display: block;
      animation: sectionFadeIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    /* ── ANIMATIONS ── */
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes sectionFadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shimmer {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    /* ── LOADING STATE ── */
    .loading {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
    }

    .loading-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--teal);
      margin: 0 3px;
      animation: bounce 1.2s infinite;
    }

    .loading-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loading-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: translateY(0);
        opacity: 0.4;
      }

      40% {
        transform: translateY(-8px);
        opacity: 1;
      }
    }

    /* ── RESPONSIVE DESIGN ── */
    @media (min-width: 768px) {
      .app {
        max-width: 860px;
        padding-bottom: 64px;
      }

      .header {
        padding: 64px 32px 20px;
      }

      .header-left h1 {
        font-size: 36px;
        margin-top: 4px;
      }

      .header-left h2 {
        font-size: 15px;
      }

      .avatar-btn {
        width: 56px;
        height: 56px;
        border-radius: 20px;
      }

      .grade-strip {
        padding: 16px 32px 32px;
        justify-content: center;
      }

      .grade-pill {
        font-size: 16px;
        padding: 10px 28px;
      }

      .section-label {
        padding: 12px 32px 24px;
      }

      .section-label h3 {
        font-size: 22px;
      }

      .cards-list {
        padding: 0 32px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 24px;
        align-items: start;
      }

      .ch-header {
        padding: 20px 24px;
      }

      .ch-title {
        font-size: 18px;
      }
    }

    @media (min-width: 1024px) {
      .app {
        max-width: 1200px;
      }

      .cards-list {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 28px;
      }
    }

    /* ── LOGIN OVERLAY ── */
    .login-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(ellipse 60% 50% at 10% 0%, #c8d8ff 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 90% 10%, #ffd6e8 0%, transparent 55%),
        radial-gradient(ellipse 40% 50% at 80% 90%, #c8f5f2 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 10% 85%, #ffe8cc 0%, transparent 55%),
        #f0f4ff;
      animation: fadeIn 0.5s ease;
    }

    .login-overlay.hiding {
      animation: fadeOut 0.4s ease forwards;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--card-solid);
      border-radius: 28px;
      box-shadow: 0 8px 40px var(--shadow);
      border: 1.5px solid var(--border);
      padding: 40px 28px 36px;
      text-align: center;
      animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .login-logo {
      font-size: 36px;
      font-weight: 900;
      color: var(--text);
      margin-bottom: 4px;
    }

    .login-logo span {
      color: var(--teal);
    }

    .login-subtitle {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .login-input-wrap {
      position: relative;
      margin-bottom: 12px;
    }

    .login-input-wrap .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      pointer-events: none;
    }

    .login-input {
      width: 100%;
      padding: 14px 16px 14px 46px;
      border-radius: 16px;
      border: 1.5px solid #e8eaf6;
      background: rgba(240, 244, 255, 0.5);
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .login-input::placeholder {
      color: var(--muted);
      font-weight: 600;
    }

    .login-input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(46, 196, 182, 0.15);
    }

    .login-input.error {
      border-color: #e53935;
    }

    .login-error {
      font-size: 12px;
      font-weight: 700;
      color: #e53935;
      min-height: 20px;
      margin-bottom: 8px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .login-error.visible {
      opacity: 1;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 900;
      color: #fff;
      background: linear-gradient(135deg, var(--teal), #26c6da);
      box-shadow: 0 6px 24px rgba(46, 196, 182, 0.4);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .login-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 10px 32px rgba(46, 196, 182, 0.5);
    }

    .login-btn:active {
      transform: scale(0.97);
    }

    .login-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    .login-spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    /* ── USER MENU POPUP ── */
    .user-popup {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: 240px;
      padding: 16px;
      background: var(--card-solid);
      border-radius: 20px;
      box-shadow: 0 8px 32px var(--shadow);
      border: 1.5px solid var(--border);
      z-index: 1000;
      display: none;
      animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .user-popup.visible {
      display: block;
    }

    .user-popup-name {
      font-size: 15px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 2px;
      word-break: break-word;
    }

    .user-popup-email {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 14px;
      word-break: break-all;
    }

    .logout-btn {
      width: 100%;
      padding: 10px;
      border-radius: 14px;
      border: 2px solid #e53935;
      background: rgba(229, 57, 53, 0.06);
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 800;
      color: #e53935;
      cursor: pointer;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      background: rgba(229, 57, 53, 0.12);
      transform: translateY(-1px);
    }

    /* ── PREMIUM PROMO BANNER & POPUP BUTTON ── */
    .premium-banner {
      margin: 10px 20px 20px;
      padding: 14px 18px;
      background: linear-gradient(135deg, #121216 0%, #0a0a0c 100%);
      border: 1.5px solid rgba(212, 175, 55, 0.3);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.3s, box-shadow 0.3s;
    }

    .premium-banner:hover {
      transform: translateY(-2px);
      border-color: #d4af37;
      box-shadow: 0 8px 24px rgba(212, 175, 55, 0.25);
    }

    .premium-banner-content {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .premium-banner-icon {
      font-size: 24px;
      animation: float 2s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-4px);
      }
    }

    .premium-banner-text {
      text-align: left;
    }

    .premium-banner-text h4 {
      font-size: 14px;
      font-weight: 900;
      color: #ffe27a;
    }

    .premium-banner-text p {
      font-size: 11px;
      font-weight: 600;
      color: #8e97c5;
      margin-top: 2px;
      line-height: 1.3;
    }

    .premium-banner-arrow {
      background: linear-gradient(135deg, #ffe27a, #d4af37);
      color: #000;
      font-size: 10px;
      font-weight: 800;
      padding: 6px 12px;
      border-radius: 50px;

      const path = window.location.pathname;
      if (path.endsWith('.html')) {
        let cleanPath = path.substring(0, path.length - 5);
        if (cleanPath.endsWith('/index')) {
          cleanPath = cleanPath.substring(0, cleanPath.length - 5) || '/';
        }
        history.replaceState(null, '', cleanPath + window.location.search + window.location.hash);
      }
    }

    // ── Định nghĩa label và icon cho từng loại link ──
    const LINK_CONFIG = {
      video: { label: 'Video bài học', cls: 'lnk-video', icon: '▶️' },
      baiTap: { label: 'Tài liệu / Lý thuyết', cls: 'lnk-baiTap', icon: '📄' },
      luyenTap: { label: 'Bài tập về nhà', cls: 'lnk-tracNghiem', icon: '☑️' },
      onTap: { label: 'Ôn tập', cls: 'lnk-onTap', icon: '🔄' },
      phieuDapAn: { label: 'Phiếu đáp án', cls: 'lnk-phieuDapAn', icon: '📋' }
    };

    // ── Danh sách Đề ôn thi thử tốt nghiệp THPT Quốc gia (Premium Only) ──
    let mockExams = [];
    let studentProgressMap = {};
    let globalLessonsData = [];

    // ── LỊCH SỬ LÀM BÀI LOGIC ──
    function getLessonTitleByCode(code) {
      if (!code) return 'Không rõ đề';
      
      const matchedExam = mockExams.find(ex => ex.id === code);
      if (matchedExam) return matchedExam.title;
      
      const parts = code.split('_');
      if (parts.length >= 4) {
        const gradeNum = parts[1];
        const chapterNum = parseInt(parts[2].replace('c', ''), 10);
        const lessonNum = parseInt(parts[3].replace('b', ''), 10);
        
        const gradeObj = globalLessonsData.find(g => {
          const match = g.grade.match(/\d+/);
          return match && match[0] === gradeNum;
        });
        
        if (gradeObj) {
          let chapterObj = gradeObj.chapters.find(ch => {
            const chMatch = ch.num.match(/[IVXLCDM]+/i);
            return false;
          });
          if (!chapterObj && gradeObj.chapters[chapterNum - 1]) {
            chapterObj = gradeObj.chapters[chapterNum - 1];
          }
          if (chapterObj) {
            const lessonObj = chapterObj.lessons.find(l => parseInt(l.num, 10) === lessonNum);
            if (lessonObj) return lessonObj.title;
          }
        }
        
        // Fallback to parseQuizCode
        const typeMap = { 'cauhoi': 'Trắc nghiệm', 'đs': 'Đúng/Sai', 'tln': 'Trả lời ngắn', 'baitap': 'Bài tập', 'ontap': 'Ôn tập' };
        const typeStr = typeMap[parts[0]] || parts[0];
        return `Vật lí ${parts[1]} - Chương ${parts[2].toUpperCase().replace('C', '')} - Bài ${parseInt(parts[3].toUpperCase().replace('B', ''), 10)} (${typeStr})`;
      }
      return code;
    }

    async function loadHistoryList() {
      const historyListEl = document.getElementById('historyList');
      const session = getSession();
      if (!session || !session.premium || session.gmail.startsWith('demo_')) {
        historyListEl.innerHTML = '<div class="history-empty">Tính năng Lịch sử chỉ dành cho học sinh Premium đã đăng nhập.</div>';
        return;
      }
      
      historyListEl.innerHTML = '<div class="history-loading">Đang tải lịch sử...</div>';
      
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/student_progress?email=eq.${encodeURIComponent(session.gmail)}&select=*&order=completed_at.desc`, {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          }
        });
        if (!res.ok) throw new Error('Failed to load');
        const data = await res.json();
        
        if (!data || data.length === 0) {
          historyListEl.innerHTML = '<div class="history-empty">Chưa có lịch sử làm bài.</div>';
          return;
        }
        
        historyListEl.innerHTML = '';
        data.forEach(item => {
          const isExam = item.type.startsWith('exam');
          const title = getLessonTitleByCode(item.lesson_id);
          const score = item.score !== null ? parseFloat(item.score).toFixed(2) : '-';
          
          let scoreClass = 'low';
          if (item.score >= 8.0) scoreClass = 'high';
          else if (item.score >= 5.0) scoreClass = 'medium';
          
          const dateStr = new Date(item.completed_at).toLocaleString('vi-VN', {
            hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit', year: 'numeric'
          });
          
          const typeBadge = isExam ? '<span class="history-badge exam">Thi thử VIP</span>' : '<span class="history-badge quiz">Luyện tập</span>';
          
          const html = `
            <div class="history-item">
              <div class="history-info">
                <div class="history-title" title="${title}">${title}</div>
                <div class="history-meta">
                  ${typeBadge}
                  <span class="history-date">${dateStr}</span>
                </div>
              </div>
              <div class="history-score-wrap">
                <div class="history-score ${scoreClass}">${score}</div>
                <button class="history-action" onclick="retryAttempt('${item.lesson_id}', '${isExam ? 'exam' : 'quiz'}')">Làm lại</button>
              </div>
            </div>
          `;
          historyListEl.insertAdjacentHTML('beforeend', html);
        });
      } catch (err) {
        historyListEl.innerHTML = '<div class="history-empty">Lỗi khi tải lịch sử. Vui lòng thử lại sau.</div>';
      }
    }

    function retryAttempt(lessonId, type) {
      if (type === 'exam') {
        window.location.href = `l.html#${lessonId}`;
      } else {
        window.location.href = `q.html?quiz=${lessonId}`;
      }
    }

    // ── DASHBOARD & NHẮC NHỞ LOGIC ──
    function openDashboard() {
      document.getElementById('dashboardModal').classList.add('visible');
      
      // Compute Streak
      let dates = [];
      try { dates = JSON.parse(localStorage.getItem('zphysics_activity_dates') || '[]'); } catch(e){}
      let streak = 0;
      if (dates.length > 0) {
        dates.sort((a, b) => new Date(b) - new Date(a));
        const todayStr = new Date().toLocaleDateString('en-CA');
        const yesterdayDate = new Date();
        yesterdayDate.setDate(yesterdayDate.getDate() - 1);
        const yesterdayStr = yesterdayDate.toLocaleDateString('en-CA');
        
        let currentDate = new Date(dates[0]);
        if (dates[0] === todayStr || dates[0] === yesterdayStr) {
          streak = 1;
          for (let i = 1; i < dates.length; i++) {
            const prevDate = new Date(dates[i]);
            const diffDays = (currentDate - prevDate) / (1000 * 3600 * 24);
            if (diffDays === 1) {
              streak++;
              currentDate = prevDate;
            } else if (diffDays > 1) {
              break;
            }
          }
        }
      }
      document.getElementById('statStreak').textContent = streak;

      // Compute Completed
      const completedCount = Object.keys(studentProgressMap).length;
      document.getElementById('statCompleted').textContent = completedCount;

      // Tải lịch sử làm bài
      loadHistoryList();

      // Init reminder UI if Capacitor
      if (window.Capacitor) {
        document.getElementById('reminderSettings').style.display = 'block';
        const isEnabled = localStorage.getItem('zphysics_reminder_enabled') === 'true';
        const rTime = localStorage.getItem('zphysics_reminder_time') || '20:00';
        document.getElementById('reminderTime').value = rTime;
        if (isEnabled) {
          document.getElementById('reminderToggle').classList.add('active');
          document.getElementById('reminderTimeRow').style.display = 'flex';
        } else {
          document.getElementById('reminderToggle').classList.remove('active');
          document.getElementById('reminderTimeRow').style.display = 'none';
        }
      }
    }

    function closeDashboard() {
      document.getElementById('dashboardModal').classList.remove('visible');
    }

    async function toggleReminder() {
      const toggle = document.getElementById('reminderToggle');
      const timeRow = document.getElementById('reminderTimeRow');
      const isCurrentlyEnabled = toggle.classList.contains('active');
      
      if (!isCurrentlyEnabled) {
        if (window.Capacitor && window.Capacitor.Plugins.LocalNotifications) {
          const perm = await window.Capacitor.Plugins.LocalNotifications.requestPermissions();
          if (perm.display !== 'granted') {
            alert('Cần cấp quyền thông báo để sử dụng tính năng này!');
            return;
          }
        }
        toggle.classList.add('active');
        timeRow.style.display = 'flex';
        localStorage.setItem('zphysics_reminder_enabled', 'true');
        scheduleLocalNotification();
      } else {
        toggle.classList.remove('active');
        timeRow.style.display = 'none';
        localStorage.setItem('zphysics_reminder_enabled', 'false');
        if (window.Capacitor && window.Capacitor.Plugins.LocalNotifications) {
          await window.Capacitor.Plugins.LocalNotifications.cancel({ notifications: [{ id: 1 }] });
        }
      }
    }

    async function saveReminderTime() {
      const timeVal = document.getElementById('reminderTime').value;
      localStorage.setItem('zphysics_reminder_time', timeVal);
      if (localStorage.getItem('zphysics_reminder_enabled') === 'true') {
        scheduleLocalNotification();
      }
    }

    async function scheduleLocalNotification() {
      if (!window.Capacitor || !window.Capacitor.Plugins.LocalNotifications) return;
      const timeVal = localStorage.getItem('zphysics_reminder_time') || '20:00';
      const [hours, minutes] = timeVal.split(':').map(Number);
      
      await window.Capacitor.Plugins.LocalNotifications.cancel({ notifications: [{ id: 1 }] });
      await window.Capacitor.Plugins.LocalNotifications.schedule({
        notifications: [
          {
            title: "Đến giờ học Vật lý rồi! 🚀",
            body: "Hãy vào Zphysics để hoàn thành mục tiêu hôm nay nhé!",
            id: 1,
            schedule: {
              on: { hour: hours, minute: minutes },
              repeats: true,
              allowWhileIdle: true
            },
            sound: null,
            attachments: null,
            actionTypeId: "",
            extra: null
          }
        ]
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (window.Capacitor && localStorage.getItem('zphysics_reminder_enabled') === 'true') {
        scheduleLocalNotification();

    // Kiểm tra bài học có được miễn phí xem video & tài liệu không
    function isLessonFree(gradeNum, cNum, lIdx) {
      const g = String(gradeNum);
      if (g === '10') {
        if (cNum === 1 && lIdx < 3) return true; // 3 bài đầu chương 1
        if (cNum === 2 && lIdx < 2) return true; // 2 bài đầu chương 2
      } else if (g === '11' || g === '12') {
        if (cNum === 1 && lIdx < 3) return true; // 3 bài đầu chương 1
      }
      return false;
    }

    // ── Chuyển lớp ──
    function switchGrade(idx) {
      activeGrade = idx;
      document.querySelectorAll('.grade-pill').forEach((b, i) => {
        b.classList.toggle('active', i === idx);
      });
      document.querySelectorAll('.grade-section').forEach((s, i) => {
        s.classList.toggle('active', i === idx);
      });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── Toggle card ──
    function toggleCard(card) {
      const list = card.querySelector('.lesson-list');
      const isOpen = card.classList.contains('open');
      card.closest('.cards-list').querySelectorAll('.ch-card.open').forEach(c => {
        if (c !== card) {
          c.classList.remove('open');
          c.querySelector('.lesson-list').style.maxHeight = '0';
        }
      });
      if (isOpen) {
        card.classList.remove('open');
        list.style.maxHeight = '0';
      } else {
        card.classList.add('open');
        list.style.maxHeight = list.scrollHeight + 'px';
      }
    }

      if (!text) return '';
      return text.toLowerCase()
        .replace(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g, "a")
        .replace(/è|é|ẹ|ẻ|ẽ|ê|ề|ế|ệ|ể|ễ/g, "e")
        .replace(/ì|í|ị|ỉ|ĩ/g, "i")
        .replace(/ò|ó|ọ|ỏ|õ|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g, "o")
        .replace(/ù|ú|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g, "u")
        .replace(/ỳ|ý|ỵ|ỷ|ỹ/g, "y")
        .replace(/đ/g, "d")
        .replace(/\u0300|\u0301|\u0303|\u0309|\u0323/g, "") 
        .replace(/\u02C6|\u0306|\u031B/g, "")
        .replace(/[^a-z0-9\s]/g, "")
        .replace(/\s+/g, ' ')
        .trim();
    }

    function getYouTubeEmbedUrl(url) {
      if (!url) return '';
      let videoId = '';

      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
      const match = url.match(regExp);

      if (match && match[2].length === 11) {
        videoId = match[2];
      } else {
        try {
          const urlObj = new URL(url);
          if (urlObj.hostname.includes('youtube.com')) {
            videoId = urlObj.searchParams.get('v');
          }
        } catch (e) { }
      }

      if (videoId) {
        return `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
      }
      return url;
    }

        if (statusEl) {
          statusEl.textContent = 'Gói: Miễn phí';
          statusEl.style.color = '#a1a1aa';
        }

        const banner = document.querySelector('.premium-banner');
        if (banner) banner.style.display = 'flex';

        const pBtn = document.querySelector('.premium-btn-popup');
        if (pBtn) {
          pBtn.innerHTML = '👑 Nâng cấp Premium';
          pBtn.style.pointerEvents = 'auto';
          pBtn.style.background = 'linear-gradient(135deg, #ffe27a, #d4af37)';
          pBtn.style.color = '#000';
          pBtn.style.border = 'none';
          pBtn.style.boxShadow = '0 4px 12px rgba(212, 175, 55, 0.25)';
        }

        // Xóa kiểu viền phát sáng inline để trở về giao diện Free gốc
        document.querySelectorAll('.ch-card-wrapper').forEach(wrapper => {
          const glow = wrapper.querySelector('.ch-card-glow');
          const card = wrapper.querySelector('.ch-card');
          if (glow) glow.style.background = '';
          if (card) {
            card.style.backgroundImage = '';
            card.style.backgroundOrigin = '';
            card.style.backgroundClip = '';
          }
        });
      }

      const session = getSession();
      document.getElementById('popupEmail').textContent = session ? session.gmail : '';
      const overlay = document.getElementById('loginOverlay');
      overlay.classList.add('hiding');
      setTimeout(() => overlay.style.display = 'none', 400);
    }

    function showLogin() {
      const overlay = document.getElementById('loginOverlay');
      overlay.style.display = 'flex';
      overlay.classList.remove('hiding');
    }

    let isRegistering = false; // Biến đánh dấu đang trong trạng thái đăng ký tài khoản mới

    function cancelRegistration() {
      isRegistering = false;
      const emailInput = document.getElementById('loginEmail');
      const nameInput = document.getElementById('loginName');
      const nameWrap = document.getElementById('loginNameWrap');
      const subtitleEl = document.getElementById('loginSubtitle');
      const btn = document.getElementById('loginBtn');
      const errorEl = document.getElementById('loginError');

      emailInput.disabled = false;
      btn.disabled = false;
      nameWrap.style.display = 'none';
      nameInput.value = '';
      errorEl.classList.remove('visible');
      subtitleEl.textContent = 'Đăng nhập bằng Gmail để tiếp tục';
      btn.innerHTML = '🚀 Đăng nhập';
      emailInput.focus();
    }

    async function doLogin() {
      const emailInput = document.getElementById('loginEmail');
      const nameInput = document.getElementById('loginName');
      const nameWrap = document.getElementById('loginNameWrap');
      const subtitleEl = document.getElementById('loginSubtitle');
      const errorEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');
      const gmail = emailInput.value.trim().toLowerCase();

      // Reset
      errorEl.classList.remove('visible');
      emailInput.classList.remove('error');
      nameInput.classList.remove('error');

      if (!gmail) {
        errorEl.textContent = '⚠️ Vui lòng nhập Gmail';
        errorEl.classList.add('visible');
        emailInput.classList.add('error');
        emailInput.style.animation = 'shakeX 0.5s ease';
        setTimeout(() => emailInput.style.animation = '', 500);
        emailInput.focus();
        return;
      }

      // Xử lý khi đang ở giao diện đăng ký học sinh mới
      if (isRegistering) {
        const fullName = nameInput.value.trim();
        if (!fullName) {
          errorEl.textContent = '⚠️ Vui lòng nhập Họ và Tên để kích hoạt';
          errorEl.classList.add('visible');
          nameInput.classList.add('error');
          nameInput.style.animation = 'shakeX 0.5s ease';
          setTimeout(() => nameInput.style.animation = '', 500);
          nameInput.focus();
          return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="login-spinner"></span> Đang kích hoạt...';

        try {
          const regUrl = `${SHEETS_API_URL}?action=registerStudent&gmail=${encodeURIComponent(gmail)}&name=${encodeURIComponent(fullName)}`;
          const response = await fetch(regUrl);
          if (!response.ok) throw new Error('Không thể kết nối Web App để kích hoạt');
          const result = await response.json();

          if (result && result.success) {
            saveSession(gmail, result.ten || fullName, false); // Mới đăng ký mặc định là Free (premium = false)
            window.location.reload();
          } else {
            throw new Error(result.error || result.message || 'Lỗi xử lý kích hoạt.');
          }
        } catch (err) {
          console.error(err);
          errorEl.textContent = '❌ Lỗi kích hoạt: ' + (err.message || 'Lỗi mạng, hãy thử lại.');
          errorEl.classList.add('visible');
        } finally {
          btn.disabled = false;
          if (isRegistering) {
            btn.innerHTML = '✨ Kích hoạt tài khoản Free';
          }
        }
        return;
      }

      // Trạng thái đăng nhập kiểm tra thông thường
      btn.disabled = true;
      btn.innerHTML = '<span class="login-spinner"></span> Đang kiểm tra...';

      try {
        const url = `${SUPABASE_URL}/rest/v1/students?email=eq.${encodeURIComponent(gmail)}&select=*`;
        const res = await fetch(url, {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          }
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const students = await res.json();

        if (students && students.length > 0) {
          const student = students[0];
          const isPremium = student.role === 'premium' && (!student.premium_until || new Date(student.premium_until) > new Date());
          saveSession(gmail, student.full_name || gmail, isPremium, student.premium_until);
          window.location.reload();
        } else {
          // Gmail chưa tồn tại trong hệ thống -> Mở form đăng ký tự động
          isRegistering = true;
          emailInput.disabled = true; // Khóa trường email để tránh đổi khi đang nhập tên
          nameWrap.style.display = 'block';
          subtitleEl.innerHTML = '<span style="color:var(--teal); font-weight:800;">TÀI KHOẢN MỚI</span><br>Nhập Họ & Tên của em để kích hoạt tài khoản Free';
          btn.innerHTML = '✨ Kích hoạt tài khoản Free';
          btn.disabled = false; // Kích hoạt lại nút bấm để học sinh bấm đăng ký
          nameInput.focus();
        }
      } catch (err) {
        console.error(err);
        errorEl.textContent = '⚠️ Lỗi kết nối. Vui lòng thử lại.';
        errorEl.classList.add('visible');
      } finally {
        if (!isRegistering) {
          btn.disabled = false;
          btn.innerHTML = '🚀 Đăng nhập';
        }
      }
    }

    function doLogout() {
      clearSession();
      window.location.reload();
    }

    // ── Xử lý popup avatar: chỉ dùng 1 listener duy nhất ──
    document.addEventListener('click', function (e) {
      const popup = document.getElementById('userPopup');
      // Click vào avatar (hoặc bất kỳ phần tử con nào của nó trừ popup)
      if (e.target.closest('#avatarBtn') && !e.target.closest('#userPopup')) {
        popup.classList.toggle('visible');
        return;
      }
      // Click vào nút đăng xuất
      if (e.target.closest('#logoutBtn')) {
        doLogout();
        return;
      }
      // Click ra ngoài → đóng popup
      if (!e.target.closest('#userPopup')) {
        popup.classList.remove('visible');
      }
    });

    // ── HỖ TRỢ XEM THỬ DEMO KHÔNG CẦN DEPLOY GOOGLE SHEETS ──
    const urlParams = new URLSearchParams(window.location.search);
    const demoMode = urlParams.get('demo');

    if (demoMode === 'premium') {
      saveSession('demo_premium@zphysics.vn', 'Demo Premium Student', true);
      showApp('Demo Premium Student', true);
    } else if (demoMode === 'free') {
      saveSession('demo_free@zphysics.vn', 'Demo Free Student', false);
      showApp('Demo Free Student', false);
    } else {
      // ── Khởi động thực tế: kiểm tra session và xác thực trực tuyến ──
      const existingSession = getSession();
      if (existingSession && existingSession.gmail) {
        if (existingSession.gmail.startsWith('demo_')) {
          // Bỏ qua xác thực online với tài khoản demo để dễ dàng kiểm thử
          showApp(existingSession.ten, existingSession.premium);
        } else {
          const emailInput = document.getElementById('loginEmail');
          const btn = document.getElementById('loginBtn');
          const errorEl = document.getElementById('loginError');

          // Điền sẵn email và hiển thị trạng thái đang xác thực
          emailInput.value = existingSession.gmail;
          emailInput.disabled = true;
          btn.disabled = true;
          btn.innerHTML = '<span class="login-spinner"></span> Đang xác thực...';

          const checkUrl = `${SUPABASE_URL}/rest/v1/students?email=eq.${encodeURIComponent(existingSession.gmail)}&select=*`;
          fetch(checkUrl, {
            headers: {
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
            }
          })
            .then(res => {
              if (!res.ok) throw new Error('HTTP ' + res.status);
              return res.json();
            })
            .then(students => {
              if (students && students.length > 0) {
                const student = students[0];
                const isPremium = student.role === 'premium' && (!student.premium_until || new Date(student.premium_until) > new Date());
                
                const wasPremium = !!existingSession.premium;
                saveSession(existingSession.gmail, student.full_name || existingSession.gmail, isPremium, student.premium_until);
                showApp(student.full_name || existingSession.gmail, isPremium);
                
                // Nếu trạng thái thay đổi lên Premium, chạy lại initApp để tải tiến trình học tập
                if (isPremium && !wasPremium) {
                  initApp();
                }
              } else {
                // Không hợp lệ (đã bị xóa khỏi Database)
                clearSession();
                emailInput.value = '';
                emailInput.disabled = false;
                btn.disabled = false;
                btn.innerHTML = '🚀 Đăng nhập';
                errorEl.textContent = '❌ Tài khoản của em đã bị khóa hoặc xóa khỏi hệ thống.';
                errorEl.classList.add('visible');
              }
            })
            .catch(err => {
              console.warn('Lỗi kết nối khi xác thực, cho phép sử dụng phiên offline:', err);
              // Gặp lỗi mạng -> Cho phép vào app bình thường
              showApp(existingSession.ten, existingSession.premium);
            });
        }
      }
    }
    // Nếu chưa login → overlay tự hiện (mặc định display: flex)

    // ── THEME TOGGLE LOGIC ──
    function togglePremiumThemeMode() {
      const isLight = document.body.classList.toggle('premium-light');
      localStorage.setItem('zphysics_premium_mode', isLight ? 'light' : 'dark');
      
      const darkToggleBg = document.getElementById('darkToggleBg');
      if (darkToggleBg) {
        darkToggleBg.style.opacity = isLight ? '0' : '1';
      }
    }

    // ── Fetch JSON + Google Sheets links và khởi động ──
    async function initApp() {
      try {
        // Tải baihoc.json trước
        const baihocPromise = fetch('baihoc.json').then(res => {
          if (!res.ok) throw new Error('Không thể tải baihoc.json');
          return res.json();
        });

        // Tải danh sách đề thi luyện đề VIP từ Supabase
        const luyendePromise = fetch(`${SUPABASE_URL}/rest/v1/exams?select=*`, {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          }
        })
          .then(async res => {
            if (!res.ok) throw new Error('Không thể tải đề từ Supabase');
            const data = await res.json();
            return data.map(item => ({
              ...item,
              desc: item.description, // Khớp trường desc mà frontend sử dụng
              lop: item.grade,         // Khớp trường lop để phân chia theo lớp 10, 11, 12
              pdfUrl: item.pdf_url,     // Khớp trường pdfUrl
              videoUrl: item.video_url, // Khớp trường videoUrl
              mcAnswers: item.mc_answers,
              tfAnswers: item.tf_answers,
              saAnswers: item.sa_answers
            }));
          })
          .catch(err => {
            console.warn('Lỗi tải đề từ Supabase, chuyển sang dùng luyende.json offline:', err);
            // Fallback sang luyende.json cục bộ
            return fetch('luyende.json?v=' + Date.now())
              .then(res => res.json())
              .catch(() => []);
          });

        // Tải các link động từ Supabase
        const linksPromise = fetch(`${SUPABASE_URL}/rest/v1/lessons?select=*`, {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          }
        })
          .then(async res => {
            if (!res.ok) throw new Error('Không thể tải link từ Supabase');
            const data = await res.json();
            return data.map(item => ({
              lop: item.grade,
              bai: item.title,
              video: item.video_url,
              baiTap: item.exercise_url
            }));
          })
          .catch(err => {
            console.warn('Lỗi tải Supabase lessons links:', err);
            return [];
          });

        const session = getSession();
        let progressPromise = Promise.resolve([]);
        if (session && session.premium && session.gmail && !session.gmail.startsWith('demo_')) {
          progressPromise = fetch(`${SUPABASE_URL}/rest/v1/student_progress?email=eq.${encodeURIComponent(session.gmail)}&select=*`, {
            headers: {
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
            }
          }).then(res => res.ok ? res.json() : []).catch(() => []);
        }

        const [baihocData, sheetLinks, luyendeData, progressData] = await Promise.all([baihocPromise, linksPromise, luyendePromise, progressPromise]);

        if (luyendeData && luyendeData.length > 0) {
          mockExams = luyendeData;
        }

        if (progressData && progressData.length > 0) {
          progressData.forEach(p => {
            if (p.score == null || p.score >= 8.0) {
              studentProgressMap[p.lesson_id] = (studentProgressMap[p.lesson_id] || 0) + 1;
            }
          });
        }

        // Trộn các link từ Sheet vào cấu trúc baihoc.json
        if (sheetLinks && sheetLinks.length > 0) {
          baihocData.forEach(gradeObj => {
            const gNum = gradeObj.grade.match(/\d+/) ? gradeObj.grade.match(/\d+/)[0] : '';

            gradeObj.chapters.forEach(ch => {
              ch.lessons.forEach(l => {
                const matched = sheetLinks.find(sl => {
                  if (!sl.lop || !sl.bai) return false;
                  const slLopNum = String(sl.lop).match(/\d+/) ? String(sl.lop).match(/\d+/)[0] : '';
                  if (slLopNum !== gNum) return false;

                  const slBaiNum = String(sl.bai).match(/\d+/) ? String(sl.bai).match(/\d+/)[0] : '';
                  const lNumClean = String(l.num).match(/\d+/) ? String(l.num).match(/\d+/)[0] : '';
                  return slBaiNum && lNumClean && parseInt(slBaiNum, 10) === parseInt(lNumClean, 10);
                });

                if (matched) {
                  if (!l.links) l.links = {};
                  if (matched.video && matched.video.trim() !== '' && matched.video.trim() !== '#') {
                    l.links.video = matched.video.trim();
                  }
                  if (matched.baiTap && matched.baiTap.trim() !== '' && matched.baiTap.trim() !== '#') {
                    l.links.baiTap = matched.baiTap.trim();
                  }
                }
              });
            });
          });
        }

        globalLessonsData = baihocData;
        renderAll(baihocData);
      } catch (err) {
        console.error(err);
        document.getElementById('gradeContent').innerHTML =
          `<p style="color:#e53935;text-align:center;padding:40px 24px;font-weight:700">⚠️ Không tải được dữ liệu bài học.<br><small style="font-weight:600;opacity:.7">${err.message || 'Lỗi kết nối'}</small></p>`;
      }
    }

    initApp();
  </script>
