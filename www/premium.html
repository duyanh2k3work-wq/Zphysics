<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zphysics — Kích hoạt Premium</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0A0A0C;
      --card-bg: rgba(22, 22, 26, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --teal: #2ec4b6;
      --teal-glow: rgba(46, 196, 182, 0.35);
      --text: #ffffff;
      --muted: #a1a1aa;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(46, 196, 182, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(124, 77, 255, 0.15) 0%, transparent 40%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    /* Background glow orbs */
    .orb {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 1;
      opacity: 0.5;
      animation: float 8s infinite alternate;
    }

    .orb-1 {
      background: var(--teal);
      top: -50px;
      left: -50px;
    }

    .orb-2 {
      background: #7c4dff;
      bottom: -50px;
      right: -50px;
      animation-delay: -4s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, 20px) scale(1.2); }
    }

    /* Glass Card */
    .activation-card {
      width: 100%;
      max-width: 440px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 32px;
      border: 1.5px solid var(--border);
      padding: 48px 36px;
      text-align: center;
      z-index: 2;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
      position: relative;
      overflow: hidden;
    }

    .activation-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--teal), #7c4dff, var(--teal));
      background-size: 200% auto;
      animation: shine 4s linear infinite;
    }

    @keyframes shine {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .logo {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 24px;
      letter-spacing: -0.5px;
    }

    .logo span {
      color: var(--teal);
    }

    /* Loader */
    .loader-container {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 0 auto 32px;
    }

    .spinner {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      border: 4px solid rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      border-top-color: var(--teal);
      border-bottom-color: #7c4dff;
      animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }

    .success-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 40px;
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .success-icon.show {
      transform: translate(-50%, -50%) scale(1);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 12px;
      color: var(--text);
    }

    .status-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      font-weight: 600;
      min-height: 48px;
    }

    .error-box {
      display: none;
      margin-top: 20px;
      animation: fadeIn 0.4s ease;
    }

    .btn {
      display: inline-block;
      width: 100%;
      padding: 14px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(135deg, var(--teal), #26c6da);
      box-shadow: 0 6px 20px var(--teal-glow);
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      margin-top: 16px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px var(--teal-glow);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      color: var(--text);
      box-shadow: none;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
      box-shadow: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="activation-card">
    <div class="logo">Z<span>physics</span></div>
    
    <div class="loader-container">
      <div class="spinner" id="spinner"></div>
      <div class="success-icon" id="successIcon">👑</div>
    </div>

    <div class="status-title" id="statusTitle">Đang xử lý kích hoạt...</div>
    <div class="status-desc" id="statusDesc">Đang kết nối hệ thống và kiểm tra tài khoản của em...</div>

    <div class="error-box" id="errorBox">
      <a href="index.html" class="btn" id="errorBtn">Quay lại trang chủ</a>
    </div>
  </div>

  <script>
    const SHEETS_API_URL = 'https://script.google.com/macros/s/AKfycbzxnkAXTX9lMgdq854Nm8CAWiaULzHD7MAo4Er7XBVnmfxhubWP4KWSF5_yNfVaCKXMdQ/exec';
    const SESSION_KEY = 'zphysics_session';

    function getSession() {
      try {
        const raw = localStorage.getItem(SESSION_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (e) {
        return null;
      }
    }

    function saveSession(session) {
      try {
        localStorage.setItem(SESSION_KEY, JSON.stringify(session));
      } catch (e) {
        console.error('Không thể lưu session:', e);
      }
    }

    async function startActivation() {
      const session = getSession();
      const statusTitle = document.getElementById('statusTitle');
      const statusDesc = document.getElementById('statusDesc');
      const spinner = document.getElementById('spinner');
      const successIcon = document.getElementById('successIcon');
      const errorBox = document.getElementById('errorBox');
      const errorBtn = document.getElementById('errorBtn');

      if (!session || !session.gmail) {
        spinner.style.display = 'none';
        statusTitle.textContent = 'Chưa đăng nhập ⚠️';
        statusDesc.textContent = 'Em cần đăng nhập tài khoản Zphysics trước khi kích hoạt gói Premium nhé.';
        errorBtn.textContent = 'Đi tới Đăng nhập';
        errorBox.style.display = 'block';
        return;
      }

      const gmail = session.gmail;

      // Stage 1
      statusTitle.textContent = 'Kích hoạt Premium ✨';
      statusDesc.textContent = `Đang kích hoạt tài khoản Premium trọn đời cho gmail: ${gmail}...`;

      try {
        const url = `${SHEETS_API_URL}?action=upgradePremium&gmail=${encodeURIComponent(gmail)}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error('Không thể kết nối với máy chủ kích hoạt');
        const data = await res.json();

        if (data && data.success) {
          // Update local session
          session.premium = true;
          session.premium_until = null; // Trọn đời
          saveSession(session);

          // Success Animation
          spinner.style.borderTopColor = 'transparent';
          spinner.style.borderBottomColor = 'transparent';
          spinner.style.animation = 'none';
          successIcon.classList.add('show');

          statusTitle.textContent = 'Kích hoạt thành công! 🎉';
          statusDesc.textContent = 'Tài khoản của em đã được nâng cấp lên gói Premium trọn đời hoàn toàn miễn phí. Đang chuyển hướng về trang chủ...';

          setTimeout(() => {
            window.location.href = 'index.html';
          }, 3500);

        } else {
          throw new Error(data.message || 'Lỗi hệ thống kích hoạt');
        }
      } catch (err) {
        console.error(err);
        spinner.style.display = 'none';
        statusTitle.textContent = 'Lỗi kích hoạt ❌';
        statusDesc.textContent = err.message || 'Có lỗi xảy ra trong quá trình kích hoạt, vui lòng thử lại hoặc liên hệ Thầy/Cô để được trợ giúp.';
        errorBtn.textContent = 'Thử lại';
        errorBtn.href = 'javascript:window.location.reload()';
        errorBox.style.display = 'block';
        
        // Add a go back button
        const backBtn = document.createElement('a');
        backBtn.className = 'btn btn-secondary';
        backBtn.href = 'index.html';
        backBtn.textContent = 'Quay về trang chủ';
        backBtn.style.marginTop = '10px';
        errorBox.appendChild(backBtn);
      }
    }

    window.addEventListener('DOMContentLoaded', startActivation);
  </script>
</body>

</html>
